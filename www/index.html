<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول النص إلى صوت</title>

    <link rel="stylesheet" href="style.css"> 
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">
    <h2>🔊 محول النص إلى صوت</h2>

    <textarea id="text" placeholder="اكتب النص هنا..."></textarea>

    <label>اللغة</label>
    <select id="lang">
        <option value="ar-SA">العربية</option>
        <option value="en-US">English</option>
        <option value="fr-FR">Français</option>
        <option value="es-ES">Español</option>
        <option value="de-DE">Deutsch</option>
    </select>

    <label>الصوت</label>
    <select id="voice"></select>

    <label>السرعة</label>
    <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">

    <label>حدة الصوت</label>
    <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">

    <div class="buttons">
        <button onclick="speak()">▶ تشغيل</button>
        <button onclick="pauseSpeech()">⏸ إيقاف مؤقت</button>
        <button onclick="resumeSpeech()">▶ متابعة</button>
        <button onclick="stopSpeech()">⏹ إيقاف</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
